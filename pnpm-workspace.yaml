packages:
  - 'packages/*'
  - 'apps/*'

# Centralized versions (pnpm catalog). Reference with "catalog:" in package.json.
# Peer-dependency ranges in packages/core and packages/testing stay explicit on
# purpose (they intentionally span multiple major versions).
catalog:
  # runtime — nest / casl
  '@casl/ability': ^7.0.0
  '@casl/react': ^7.0.0
  '@nestjs/cli': ^11.0.23
  '@nestjs/common': ^11.1.26
  '@nestjs/core': ^11.1.26
  '@nestjs/platform-express': ^11.1.26
  '@nestjs/testing': ^11.1.26
  reflect-metadata: ^0.2.2
  rxjs: ^7.8.2
  # runtime — react
  react: ^19.2.7
  react-dom: ^19.2.7
  # build / tooling
  tsdown: ^0.22.2
  turbo: ^2.9.18
  typescript: ^6.0.3
  vite: ^8.0.16
  '@vitejs/plugin-react': ^6.0.2
  vitest: ^4.1.9
  # testing
  supertest: ^7.2.2
  # types
  '@types/node': ^24.13.2
  '@types/supertest': ^7.2.0
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  # eslint + prettier
  eslint: ^10.3.0
  '@eslint/js': ^10.0.1
  typescript-eslint: ^8.59.2
  '@typescript-eslint/parser': ^8.59.2
  eslint-config-prettier: ^10.1.8
  eslint-plugin-import: ^2.32.0
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-simple-import-sort: ^13.0.0
  eslint-plugin-turbo: ^2.9.12
  globals: ^17.6.0
  prettier: ^3.8.3
  prettier-plugin-packagejson: ^3.0.2
  prettier-plugin-sort-json: ^4.2.0
